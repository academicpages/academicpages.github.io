---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}

    <header class="masthead">
      <div class="masthead__inner-wrap">
        <!-- Title block on the left -->
        <div class="masthead__title">
          Vishal Kumar Rai
        </div>

        <!-- Navigation block on the right -->
        <nav id="site-nav" class="greedy-nav">
          <ul class="visible-links">
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/research/' | relative_url }}">Research</a></li>
            <li><a href="{{ '/cv/' | relative_url }}">CV</a></li>
            <!-- add more tabs here -->
          </ul>
          <button class="greedy-nav__toggle hidden-links">
            <span class="visually-hidden">Toggle menu</span>
            <span class="icon"></span>
          </button>
        </nav>
      </div>
    </header>

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}

  </body>
</html>
