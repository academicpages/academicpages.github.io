# Jekyll Academic Configuration for Kazi Mahir Adeeb
# Stripped of all non-breaking space (NBSP) characters to prevent Ruby Psych parser crashes.

# Basic Site Settings
locale: "en-US"
site_theme: "default"
title: "Kazi Mahir Adeeb"
title_separator: " | "
name: "Kazi Mahir Adeeb"
description: "Academic portfolio of Kazi Mahir Adeeb focusing on Constraint-Based Autonomy (CBA), thermodynamics, and quantitative systems."
url: "https://Adeeb13.github.io"
baseurl: ""
repository: "Adeeb13/KaziMahirAdeeb.io"

# Site Author Sidebar Profile Settings
author:
  avatar: "profile.png"
  name: "Kazi Mahir Adeeb"
  pronouns: "he/him"
  bio: "Ethical AI Architect & Independent Quantitative Researcher specializing in Constraint-Based Autonomy (CBA) and Applied Physics."
  location: "Khulna, Bangladesh"
  employer: "Independent Research"
  uri: "https://Adeeb13.github.io/"
  email: "thundermahir08@gmail.com"

  # Academic Indices
  googlescholar: "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  orcid: "https://orcid.org/0009-0008-7064-6110"
  ssrn: "https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=6220018"
  researchgate: "https://www.researchgate.net/profile/Kazi-Mahir-Adeeb"

  # Repositories & Social Networks
  github: "Adeeb13"
  linkedin: "kazi-mahir-adeeb"
  medium: "kazimahiradeeb"

# Publication Categories
publication_category:
  books:
    title: 'Books & Monographs'
  manuscripts:
    title: 'Preprints & Publications'
  conferences:
    title: 'Conference Papers'

# General Settings
teaser: null
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false
comments:
  provider: false

staticman:
  allowedFields: ['name', 'email', 'url', 'message']
  branch: "gh-pages"
  commitMessage: "New comment."
  filename: "comment-{@timestamp}"
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ['name', 'email', 'message']
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601"

atom_feed:
  hide: false
  path: null

# SEO and Verification Keys
google_site_verification: null
bing_site_verification: null
alexa_site_verification: null
yandex_site_verification: null

# Social Profiles Schema
social:
  type: "Person"
  name: "Kazi Mahir Adeeb"
  links:
    - "https://linkedin.com/in/kazi-mahir-adeeb"
    - "https://github.com/Adeeb13"
    - "https://linktr.ee/Kazi_Mahir_Adeeb"

# File Processing Scopes
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - LICENSE
  - README
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Rendering Engine
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections mapping
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Front Matter defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
