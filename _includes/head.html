{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- Language preference: set data-lang on <html> immediately to prevent flash -->
<script>
  (function() {
    var lang = localStorage.getItem('preferred-lang') || 'zh';
    document.documentElement.setAttribute('data-lang', lang);
  })();
</script>
<style>
  html[data-lang="en"] .lang-zh { display: none !important; }
  html[data-lang="zh"] .lang-en { display: none !important; }
  html:not([data-lang]) .lang-en { display: none !important; }
  #lang-toggle-btn { cursor: pointer; font-weight: 600; font-size: 0.85em; letter-spacing: 0.05em; }
</style>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
